# stackpilot configuration. Copy to ~/.stackpilot/config.toml (or point
# $STACKPILOT_CONFIG at it). Everything here is optional; defaults apply
# when the file is missing.
#
# NOTE: "permanent" saves from /config rewrite this file and do not
# preserve comments.

# Auto-compaction threshold: when the last request's total input tokens
# (fresh + cache reads + cache writes) exceed this, the session compacts
# automatically. 0 disables.
autoCompactAtTokens = 160000

# Max chars per tool_result before paging kicks in. Longer outputs are
# truncated in the message stack (full content stored in memory — use the
# ReadMore tool to expand). 0 disables paging.
# maxToolResultChars = 10000

# Confine file tools (Read/Write/Edit/Patch/Grep/Glob) to the workspace root
# (the git root, else the cwd). When true, any path outside that root — an
# absolute path like /etc/passwd or a ../ escape — is refused. Off by default
# so out-of-repo reads keep working; turn on for untrusted or autonomous runs.
# confineToWorkspace = false

# Progressive tool loading. When true, sessions start with only the core
# exploration tools' schemas (Read/Grep/Glob); every other allowed tool is
# advertised by name in the system prompt and its full schema is loaded the
# first time the model calls it. Shrinks the cached tool prefix (~12K tokens)
# at cold start — biggest win on short sessions. Off by default.
# progressiveTools = false

# Idle cache keep-alive (REPL/TUI only). When a turn starts after being idle
# for at least this many ms, stackpilot first sends a tiny 1-token request
# that re-reads the current cached prefix, refreshing its TTL before the
# provider (~5 min) drops it. This trades one cheap cache-read request for the
# full multi-100K-token prefix RE-WRITE the next real turn would otherwise pay
# on a cold cache. 0 disables (default). A conservative on-value is ~240000
# (4 min — just under the typical TTL).
# cachePrewarmIdleMs = 240000

# Retry behaviour for transient failures (5xx, 429, network errors).
# Exponential backoff with jitter. Set maxRetries = 0 to disable.
# [retry]
# maxRetries = 3
# baseDelayMs = 1000
# maxDelayMs = 30000

# Tools sent to the model (schema presence, not just permission). Fewer
# tools = smaller static cache prefix = cheaper sessions. Omit the section
# to enable all. Order does not matter here — the canonical registry order
# is always preserved on the wire (cache-prefix stability).
# [tools]
# enabled = ["Read", "Edit", "Bash", "Grep", "Glob"]

# Hooks: shell commands that execute at lifecycle points. Advisory
# (fail-open): a failing hook never blocks the agent. stdout is shown to
# the model as a <system-reminder> and echoed to the terminal. Receives a
# JSON context on stdin + env vars (STACKPILOT_HOOK, STACKPILOT_TOOL).
# [hooks]
#
# [hooks.pre_tool]
# command = "./scripts/lint-staged.sh"
# timeoutMs = 5000
#
# [hooks.post_tool]
# command = "./scripts/notify.sh"
# timeoutMs = 5000
#
# [hooks.session_start]
# command = "./scripts/setup-env.sh"
# timeoutMs = 10000
#
# [hooks.session_end]
# command = "./scripts/extract-memory.sh"
# timeoutMs = 10000

# Pricing per million tokens, keyed by the model id the SERVER reports
# (dated snapshot). A date-suffix-stripped fallback is tried, so the bare
# alias key also works. Same schema as ai-agent-profiler — blocks can be
# copied between the two configs verbatim.
#
# Bedrock inference-profile ids (e.g. "eu.anthropic.claude-haiku-4-5-...-v1:0")
# are normalized to the bare alias ("claude-haiku-4-5") before lookup, so the
# alias keys below cover both direct-Anthropic and Bedrock runs.
[pricing."claude-haiku-4-5-20251001"]
inputPerMTok = 1.0
outputPerMTok = 5.0
cacheInputPerMTok = 0.10
cacheWritePerMTok = 1.25

[pricing."claude-haiku-4-5"]
inputPerMTok = 1.0
outputPerMTok = 5.0
cacheInputPerMTok = 0.10
cacheWritePerMTok = 1.25

[pricing."claude-sonnet-4-5"]
inputPerMTok = 3.0
outputPerMTok = 15.0
cacheInputPerMTok = 0.30
cacheWritePerMTok = 3.75

[pricing."claude-opus-4-8"]
inputPerMTok = 15.0
outputPerMTok = 75.0
cacheInputPerMTok = 1.50
cacheWritePerMTok = 18.75
